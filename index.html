<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CTI Executivo - IA</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/dist/umd/supabase.js" crossorigin="anonymous"></script>
    
    <style>
        :root {
            --bg-app: #0a0b10;
            --bg-card: #12141c;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-cyan: #06b6d4;
            --bg-cyan-light: rgba(6, 182, 212, 0.1);
            --accent-purple: #8b5cf6;
            --bg-purple-dark: linear-gradient(135deg, #1e1b4b 0%, #0f172a 100%);
            --borda: rgba(255, 255, 255, 0.06);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', system-ui, sans-serif;
        }

        body {
            background-color: var(--bg-app);
            background-image: radial-gradient(circle at 50% 0%, #1e1b4b 0%, transparent 50%);
            background-repeat: no-repeat;
            color: var(--text-main);
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .app-container {
            max-width: 650px;
            width: 100%;
            margin-top: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 35px;
        }

        .header h1 {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(to right, var(--accent-cyan), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
            margin-bottom: 6px;
        }

        .header p {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .card-noticia {
            background-color: var(--bg-card);
            border: 1px solid var(--borda);
            border-radius: 14px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .tag-link {
            display: inline-flex;
            align-items: center;
            background-color: var(--bg-cyan-light);
            color: var(--accent-cyan);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            text-decoration: none;
            margin-bottom: 14px;
            border: 1px solid rgba(6, 182, 212, 0.15);
        }

        .card-noticia h3 {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 10px;
            line-height: 1.4;
            color: #ffffff;
        }

        .card-noticia p {
            color: var(--text-muted);
            font-size: 0.95rem;
            line-height: 1.6;
        }

        .card-gartner {
            background: var(--bg-purple-dark);
            border: 1px solid rgba(139, 92, 246, 0.25);
            border-radius: 14px;
            padding: 24px;
            margin-top: 30px;
            box-shadow: 0 8px 25px rgba(139, 92, 246, 0.1);
        }

        .card-gartner h2 {
            font-size: 1.3rem;
            color: #d8b4fe;
            margin-bottom: 15px;
            font-weight: 700;
        }

        .card-gartner p {
            color: #e2e8f0;
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 10px;
        }

        .btn-gartner {
            display: block;
            background-color: var(--accent-purple);
            color: white;
            text-align: center;
            padding: 12px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            margin-top: 20px;
        }

        .loading-status {
            text-align: center;
            color: var(--text-muted);
            padding: 50px 10px;
            font-size: 1rem;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <header class="header">
            <h1>CTI Diário</h1>
            <p id="data-atual">Sincronizando informações...</p>
        </header>

        <main id="app-content">
            <div id="status-msg" class="loading-status">Estabelecendo conexão segura com o banco de dados...</div>
        </main>
    </div>

    <script>
        // Captura e exibe erros na tela de forma amigável
        window.onerror = function(msg, url, line) {
            const container = document.getElementById('app-content');
            if (container) {
                container.innerHTML = `<div class="loading-status" style="color: #f87171; font-weight: 600;">Erro ao renderizar painel: ${msg} <br><small>Verifique os segredos do GitHub.</small></div>`;
            }
            return false;
        };

        // Palavras-chave que o GitHub Actions vai substituir na hora de publicar
        const SUPABASE_URL = "PROCESSED_SUPABASE_URL"; 
        const SUPABASE_KEY = "PROCESSED_SUPABASE_KEY"; 

        function formatarDataEmLinha(dataString) {
            const opcoes = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            return new Date(dataString + 'T00:00:00').toLocaleDateString('pt-BR', opcoes);
        }

        function processarTextoEConstruirLayout(textoMarkdown) {
            const blocos = textoMarkdown.split('\n\n');
            let htmlFinal = '';
            let dentroDoGartner = false;
            let corpoGartner = '';

            blocos.forEach(bloco => {
                const linha = bloco.trim();
                if (!linha) return;

                if (linha.includes('##') && (linha.toLowerCase().includes('gartner') || linha.includes('🧠'))) {
                    dentroDoGartner = true;
                    return;
                }

                if (dentroDoGartner) {
                    corpoGartner += `<p>${linha.replace(/[\*\#-]/g, '').trim()}</p>`;
                    return;
                }

                if (linha.startsWith('###') || linha.includes('](')) {
                    const regexLink = /\[(.*?)\]\((.*?)\)/;
                    const encontrado = linha.match(regexLink);

                    let titulo = linha.replace(/###/g, '').trim();
                    let url = '#';
                    let temLink = false;

                    if (encontrado) {
                        titulo = encontrado[1];
                        url = encontrado[2];
                        temLink = true;
                    }

                    const partes = linha.split('\n');
                    const textoResumo = partes.slice(1).join(' ').replace(/[\*\#-]/g, '').trim();
                    const tituloLimpo = titulo.split('\n')[0].replace(/[\*\#-\[\]]/g, '').trim();

                    htmlFinal += `
                        <div class="card-noticia">
                            <a href="${url}" target="${temLink ? '_blank' : '_self'}" class="tag-link">🔗 ${temLink ? 'Acessar Referência' : 'Notícia'}</a>
                            <h3>${tituloLimpo}</h3>
                            <p>${textoResumo || 'Acesse o link de referência acima para ler a cobertura completa.'}</p>
                        </div>
                    `;
                } else {
                    if (htmlFinal !== '') {
                        htmlFinal += `<div class="card-noticia"><p>${linha.replace(/[\*\#-]/g, '').trim()}</p></div>`;
                    }
                }
            });

            if (dentroDoGartner) {
                htmlFinal += `
                    <div class="card-gartner">
                        <h2>🧠 Insights Estratégicos (Perspectiva Gartner)</h2>
                        ${corpoGartner}
                        <a href="https://www.gartner.com/en/information-technology/insights/top-technology-trends" target="_blank" class="btn-gartner">
                            Ver Tendências Oficiais no Portal Gartner ↗
                        </a>
                    </div>
                `;
            }

            return htmlFinal;
        }

        async function obterDadosDoBanco() {
            // Validação de segurança para garantir que a injeção do passo 2 funcionou
            if (SUPABASE_URL.startsWith("PROCESSED")) {
                document.getElementById('app-content').innerHTML = `<div class="loading-status" style="color: #fbbf24;">Aguardando a primeira publicação automatizada do GitHub Pages finalizar...</div>`;
                return;
            }

            try {
                // Inicializa o cliente usando o padrão global da biblioteca carregada via CDN
                const clientSupabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
                
                const { data, error } = await clientSupabase
                    .from('relatorios_cti')
                    .select('*')
                    .order('data_criacao', { ascending: false })
                    .limit(1);

                if (error) throw error;

                if (data && data.length > 0) {
                    const registro = data[0];
                    document.getElementById('data-atual').innerText = formatarDataEmLinha(registro.data_criacao);
                    document.getElementById('app-content').innerHTML = processarTextoEConstruirLayout(registro.conteudo_markdown);
                } else {
                    document.getElementById('app-content').innerHTML = '<div class="loading-status">Nenhum relatório foi encontrado na sua base de dados.</div>';
                }
            } catch (err) {
                document.getElementById('app-content').innerHTML = `<div class="loading-status" style="color: #f87171;">Falha ao carregar dados: ${err.message}</div>`;
            }
        }

        // Aguarda a janela carregar completamente para evitar erros de CORS
        window.addEventListener('load', obterDadosDoBanco);
    </script>
</body>
</html>
