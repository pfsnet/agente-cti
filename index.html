<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cyber Tech - Inteligência Artificial</title>
    <!-- Evita que navegadores (principalmente desktop) fiquem presos em uma
         versão em cache do HTML/JS após um novo deploy — sem isso, quem já
         visitou o site pode continuar vendo a lógica antiga (ex: recursos
         que só existiam em versões anteriores) até fazer refresh forçado. -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,600;0,700;1,600&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/dist/umd/supabase.js" crossorigin="anonymous"></script>

    <style>
        /* ==================== Tokens ==================== */
        :root {
            --ink: #0a0c10;
            --surface: #14181f;
            --surface-raised: #1b212b;
            --hairline: #262d38;
            --texto-titulo: #ecf0f2;
            --texto-corpo: #b6bcc4;
            --texto-tenue: #6b7280;

            --sinal: #ffb020;
            --sinal-fundo: rgba(255, 176, 32, 0.1);
            --violeta: #8b7cf6;
            --violeta-fundo: rgba(139, 124, 246, 0.12);
            --vivo: #34d399;

            --nist-cor: #2dd4bf;
            --nist-fundo: rgba(45, 212, 191, 0.12);
            --owasp-cor: #fb7185;
            --owasp-fundo: rgba(251, 113, 133, 0.12);
            --mitre-cor: #60a5fa;
            --mitre-fundo: rgba(96, 165, 250, 0.12);

            --fonte-display: 'Fraunces', Georgia, serif;
            --fonte-corpo: 'Inter', sans-serif;
            --fonte-mono: 'IBM Plex Mono', ui-monospace, monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--ink);
            background-image:
                radial-gradient(ellipse 900px 500px at 50% -10%, rgba(255, 176, 32, 0.07), transparent);
            color: var(--texto-corpo);
            font-family: var(--fonte-corpo);
            overflow-x: hidden;
            display: flex;
            justify-content: center;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        a { color: inherit; }
        a:focus-visible, button:focus-visible {
            outline: 2px solid var(--sinal);
            outline-offset: 3px;
            border-radius: 4px;
        }

        .container {
            width: 100%;
            max-width: 920px;
            padding: 28px 18px 56px;
        }

        /* ==================== Cabeçalho / Ticker ==================== */
        .ticker {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-family: var(--fonte-mono);
            font-size: 0.7rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--texto-tenue);
            margin: 0 auto 18px;
            max-width: 600px;
        }

        .ticker-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--vivo);
            box-shadow: 0 0 0 0 rgba(52, 211, 153, 0.6);
            animation: pulso 2.4s ease-out infinite;
            flex-shrink: 0;
        }

        @keyframes pulso {
            0%   { box-shadow: 0 0 0 0 rgba(52, 211, 153, 0.55); }
            70%  { box-shadow: 0 0 0 7px rgba(52, 211, 153, 0); }
            100% { box-shadow: 0 0 0 0 rgba(52, 211, 153, 0); }
        }

        @media (prefers-reduced-motion: reduce) {
            .ticker-dot { animation: none; }
        }

        header {
            text-align: center;
            margin: 0 auto 34px;
            max-width: 600px;
        }

        header h1 {
            font-family: var(--fonte-display);
            font-weight: 700;
            font-size: 2.1rem;
            color: var(--texto-titulo);
            letter-spacing: -0.01em;
        }

        header h1 em {
            font-style: italic;
            font-weight: 600;
            color: var(--sinal);
        }

        header .subtitulo {
            font-size: 0.9rem;
            color: var(--texto-tenue);
            margin-top: 6px;
        }

        /* ==================== Seletor de histórico ==================== */
        .seletor-historico {
            display: flex;
            justify-content: center;
            gap: 8px;
            overflow-x: auto;
            padding: 2px 2px 6px;
            margin: 0 auto 28px;
            max-width: 600px;
            scrollbar-width: none;
        }

        .seletor-historico::-webkit-scrollbar { display: none; }

        .pill-historico {
            flex-shrink: 0;
            font-family: var(--fonte-mono);
            font-size: 0.72rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--texto-tenue);
            background: var(--surface);
            border: 1px solid var(--hairline);
            border-radius: 20px;
            padding: 7px 14px;
            cursor: pointer;
            transition: border-color 0.2s ease, color 0.2s ease, background 0.2s ease;
        }

        .pill-historico:hover {
            border-color: rgba(255, 176, 32, 0.4);
            color: var(--texto-titulo);
        }

        .pill-historico.ativo {
            background: var(--sinal-fundo);
            border-color: var(--sinal);
            color: var(--sinal);
        }

        /* ==================== Trilha de notícias (dossiê) ==================== */
        .trilha {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 16px;
            align-items: stretch;
            margin-bottom: 20px;
        }

        .dossier-item {
            display: grid;
            grid-template-columns: 34px 1fr;
            gap: 14px;
        }

        .dossier-marker {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: var(--surface);
            border: 1px solid var(--hairline);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--fonte-mono);
            font-size: 0.72rem;
            font-weight: 500;
            color: var(--sinal);
            flex-shrink: 0;
            z-index: 1;
            align-self: start;
        }

        .dossier-body {
            background-color: var(--surface);
            border: 1px solid var(--hairline);
            border-radius: 14px;
            padding: 18px 18px 16px;
            overflow-wrap: break-word;
            word-break: break-word;
            transition: border-color 0.2s ease, transform 0.2s ease;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .dossier-body:hover {
            border-color: rgba(255, 176, 32, 0.35);
            transform: translateY(-1px);
        }

        .dossier-eyebrow {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 10px;
        }

        .fonte-tag {
            font-family: var(--fonte-mono);
            font-size: 0.68rem;
            font-weight: 500;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--sinal);
            background: var(--sinal-fundo);
            padding: 4px 8px;
            border-radius: 6px;
        }

        .dossier-body h3 {
            font-family: var(--fonte-display);
            font-weight: 600;
            font-size: 1.12rem;
            line-height: 1.35;
            color: var(--texto-titulo);
            margin-bottom: 8px;
        }

        .dossier-body p {
            font-size: 0.92rem;
            color: var(--texto-corpo);
            margin-bottom: 14px;
            flex: 1 1 auto;
        }

        .cta-artigo {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-family: var(--fonte-mono);
            font-size: 0.76rem;
            font-weight: 500;
            letter-spacing: 0.02em;
            color: var(--sinal);
            text-decoration: none;
            border: 1px solid rgba(255, 176, 32, 0.35);
            padding: 8px 12px;
            border-radius: 8px;
            align-self: flex-start;
            transition: background 0.2s ease, border-color 0.2s ease;
        }

        .cta-artigo:hover {
            background: var(--sinal-fundo);
            border-color: var(--sinal);
        }

        .cta-artigo .seta {
            transition: transform 0.2s ease;
        }

        .cta-artigo:hover .seta {
            transform: translate(2px, -2px);
        }

        /* ==================== Perspectivas (NIST / OWASP) ==================== */
        .insights-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 16px;
            margin-bottom: 16px;
        }

        .card-insight {
            background: var(--surface);
            border: 1px solid var(--hairline);
            border-radius: 16px;
            padding: 22px 20px;
        }

        .card-insight h2 {
            font-family: var(--fonte-display);
            font-weight: 600;
            font-size: 1.05rem;
            margin-bottom: 14px;
        }

        .card-insight .lista-insights li::before {
            background: currentColor;
        }

        .card-insight.card-nist {
            border-color: rgba(45, 212, 191, 0.3);
            background: radial-gradient(ellipse 380px 180px at 20% 0%, var(--nist-fundo), transparent), var(--surface);
        }

        .card-insight.card-nist h2 { color: var(--nist-cor); }
        .card-insight.card-nist .lista-insights li::before { background: var(--nist-cor); }

        .card-insight.card-owasp {
            border-color: rgba(251, 113, 133, 0.3);
            background: radial-gradient(ellipse 380px 180px at 20% 0%, var(--owasp-fundo), transparent), var(--surface);
        }

        .card-insight.card-owasp h2 { color: var(--owasp-cor); }
        .card-insight.card-owasp .lista-insights li::before { background: var(--owasp-cor); }

        .card-insight.card-mitre {
            border-color: rgba(96, 165, 250, 0.3);
            background: radial-gradient(ellipse 380px 180px at 20% 0%, var(--mitre-fundo), transparent), var(--surface);
        }

        .card-insight.card-mitre h2 { color: var(--mitre-cor); }
        .card-insight.card-mitre .lista-insights li::before { background: var(--mitre-cor); }

        /* ==================== Insights (Gartner) ==================== */
        .card-gartner {
            background:
                radial-gradient(ellipse 400px 200px at 20% 0%, rgba(139, 124, 246, 0.14), transparent),
                var(--surface);
            border: 1px solid rgba(139, 124, 246, 0.3);
            border-radius: 16px;
            padding: 26px 20px 22px;
            margin-top: 12px;
        }

        .card-gartner h2 {
            font-family: var(--fonte-display);
            font-weight: 600;
            font-size: 1.15rem;
            color: var(--violeta);
            margin-bottom: 16px;
        }

        .card-gartner p {
            margin-bottom: 13px;
            font-size: 0.92rem;
            color: var(--texto-corpo);
        }

        .card-gartner p:last-of-type { margin-bottom: 0; }

        .lista-insights {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .lista-insights li {
            position: relative;
            padding-left: 20px;
            margin-bottom: 14px;
            font-size: 0.92rem;
            color: var(--texto-corpo);
            line-height: 1.55;
        }

        .lista-insights li::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0.58em;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--violeta);
        }

        .lista-insights li:last-child { margin-bottom: 0; }

        .card-gartner strong {
            color: var(--texto-titulo);
            font-weight: 600;
        }

        .btn-gartner {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background-color: var(--violeta);
            color: #ffffff;
            text-align: center;
            padding: 13px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 500;
            font-size: 0.9rem;
            margin-top: 20px;
            transition: filter 0.2s ease;
        }

        .btn-gartner:hover { filter: brightness(1.1); }

        /* ==================== Status / Erros ==================== */
        .status-msg {
            text-align: center;
            padding: 40px 20px;
            font-size: 0.9rem;
            color: var(--texto-tenue);
            font-family: var(--fonte-mono);
        }

        @media (max-width: 400px) {
            .container { padding: 22px 12px 48px; }
            .dossier-body { padding: 16px; }
            header h1 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="ticker">
            <span class="ticker-dot"></span>
            <span>AO VIVO</span>
            <span id="data-atual">carregando briefing</span>
        </div>

        <header>
            <h1>Cyber Tech <em>Inteligência Artificial</em></h1>
            <p class="subtitulo">Briefing diário de Inteligência Artificial para decisão de negócio</p>
        </header>

        <nav id="seletor-historico" class="seletor-historico" aria-label="Histórico de briefings"></nav>

        <main id="app-content">
            <div class="status-msg">Estabelecendo conexão segura com o banco de dados...</div>
        </main>
    </div>

    <script>
        window.onerror = function (msg) {
            document.getElementById('app-content').innerHTML =
                `<div class="status-msg" style="color:#ef4444;">Erro na interface: ${msg}</div>`;
            return false;
        };

        const SUPABASE_URL = "PROCESSED_SUPABASE_URL";
        const SUPABASE_KEY = "PROCESSED_SUPABASE_KEY";

        // Mapa de nomes de exibição para fontes conhecidas — usado para gerar
        // a etiqueta de cada card a partir do domínio do link, já que o
        // relatório final (markdown) não carrega mais o nome da fonte.
        const NOMES_FONTES = {
            'techcrunch.com': 'TechCrunch',
            'technologyreview.com': 'MIT Technology Review',
            'venturebeat.com': 'VentureBeat',
            'openai.com': 'OpenAI',
            'deepmind.google': 'Google DeepMind',
            'simonwillison.net': 'Simon Willison',
            'alignmentforum.org': 'AI Alignment Forum',
            'thezvi.substack.com': 'Zvi Mowshowitz',
            'thehackernews.com': 'The Hacker News',
            'krebsonsecurity.com': 'Krebs on Security',
            'arstechnica.com': 'Ars Technica',
            'bleepingcomputer.com': 'Bleeping Computer',
            'unit42.paloaltonetworks.com': 'Palo Alto Unit 42',
        };

        function extrairFonte(url) {
            try {
                const host = new URL(url).hostname.replace(/^www\./, '');
                if (NOMES_FONTES[host]) return NOMES_FONTES[host];
                const partes = host.split('.');
                const base = partes.length >= 2 ? partes[partes.length - 2] : host;
                return base.charAt(0).toUpperCase() + base.slice(1);
            } catch {
                return 'Fonte';
            }
        }

        // Filtro de segurança client-side: mesmo com a regra no prompt, itens
        // fora do escopo (jogos, entretenimento) às vezes escapam do feed/LLM.
        // Isso é um reforço visual — a correção definitiva é no filtro do
        // script Python que monta os dados brutos.
        const PALAVRAS_FORA_DE_ESCOPO = [
            'wordle', 'horóscopo', 'crossword', 'palavra do dia', 'sudoku',
            'strands', 'spangram', 'nyt connections',
        ];

        function foraDeEscopo(titulo, resumo) {
            const texto = `${titulo} ${resumo}`.toLowerCase();
            return PALAVRAS_FORA_DE_ESCOPO.some(p => texto.includes(p));
        }

        function formatarDataEmLinha(dataString) {
            if (!dataString) return '';
            // Usa só a parte AAAA-MM-DD e formata forçando UTC — isso evita que o
            // navegador reinterprete "meia-noite UTC" como "21h do dia anterior"
            // no fuso de Brasília (UTC-3), o que fazia o cabeçalho e o histórico
            // aparecerem sempre um dia atrasados.
            const soData = dataString.slice(0, 10);
            const [ano, mes, dia] = soData.split('-').map(Number);
            if (!ano || !mes || !dia) return '';
            const data = new Date(Date.UTC(ano, mes - 1, dia));
            const opcoes = {
                weekday: 'long', year: 'numeric', month: 'long', day: 'numeric',
                timeZone: 'UTC',
            };
            return data.toLocaleDateString('pt-BR', opcoes);
        }

        // Quebra um bloco de texto corrido em parágrafos — tenta linha em
        // branco primeiro; se vier tudo em um bloco só, quebra antes de cada
        // "Sub-título:" (heurística usada quando a formatação em negrito do
        // markdown original se perde). Reaproveitada pelas 3 seções de
        // insight (NIST, OWASP, Gartner).
        function quebrarEmParagrafos(bruto) {
            let paragrafos = bruto.split(/\n{2,}/).map((p) => p.trim()).filter(Boolean);

            if (paragrafos.length <= 1) {
                const regexTitulo = /(^|\.\s+)([A-ZÀ-Ú][^.:]{3,70}?):\s+/g;
                const pontos = [];
                let m;
                while ((m = regexTitulo.exec(bruto)) !== null) {
                    pontos.push(m.index + m[1].length);
                }
                if (pontos.length > 1) {
                    paragrafos = pontos
                        .map((inicio, i) => {
                            const fim = i + 1 < pontos.length ? pontos[i + 1] : bruto.length;
                            return bruto.slice(inicio, fim).trim();
                        })
                        .filter(Boolean);
                } else {
                    paragrafos = [bruto];
                }
            }

            return paragrafos
                .map((p) => p.replace(/^([A-ZÀ-Ú][^:]{3,70}):\s*/, '<strong>$1:</strong> '))
                .filter(Boolean);
        }

        function processarTextoEConstruirLayout(textoMarkdown) {
            if (!textoMarkdown || !textoMarkdown.trim()) {
                return '<div class="status-msg">Nenhum conteúdo disponível neste briefing.</div>';
            }

            const texto = textoMarkdown.replace(/\*\*?/g, '');

            // Localiza as três seções de análise (NIST / OWASP / Gartner)
            // buscando diretamente pela frase-chave de cada uma, em vez de
            // depender de o modelo usar "##" como cabeçalho — LLMs nem sempre
            // seguem à risca instrução de nível de formatação (às vezes
            // escrevem tudo em um único parágrafo corrido). Pega só a
            // primeira ocorrência de cada frase (a real seção), ignorando se
            // o termo aparecer de novo dentro do próprio texto de análise.
            // Relatórios antigos (só com Gartner) continuam funcionando.
            const candidatosSecao = [
                { tipo: 'nist', regex: /perspectiva\s+nist/i },
                { tipo: 'owasp', regex: /perspectiva\s+owasp/i },
                { tipo: 'mitre', regex: /perspectiva\s+mitre(\s+atlas)?/i },
                { tipo: 'gartner', regex: /insights\s+estrat[ée]gicos|perspectiva\s+gartner/i },
            ];

            const marcadores = [];
            candidatosSecao.forEach(({ tipo, regex }) => {
                const achado = texto.match(regex);
                if (achado) {
                    let fimCabecalho = achado.index + achado[0].length;
                    // Consome o que normalmente vem logo depois da frase-chave
                    // (ex: " (AI Risk Management Framework):"), pra começar o
                    // corpo da seção já no texto da análise em si.
                    const restante = texto.slice(fimCabecalho);
                    const extra = restante.match(/^(\s*\([^)]{0,80}\))?\s*:?\s*/);
                    if (extra) fimCabecalho += extra[0].length;
                    marcadores.push({ tipo, inicio: achado.index, fimCabecalho });
                }
            });
            marcadores.sort((a, b) => a.inicio - b.inicio);

            function inicioDaLinha(txt, pos, minPos) {
                const idx = txt.lastIndexOf('\n', pos - 1);
                // Só usa a quebra de linha encontrada se ela estiver DENTRO do
                // corpo desta seção (depois de minPos). Se não houver quebra
                // de linha (texto corrido, sem "\n") ou ela pertencer a um
                // trecho anterior, mantém a posição original — sem isso, o
                // cenário de parágrafo corrido (sem nenhuma quebra de linha)
                // ficava com a seção vazia.
                if (idx === -1 || idx + 1 < minPos) return pos;
                return idx + 1;
            }

            const blocoNoticias = marcadores.length ? texto.slice(0, marcadores[0].inicio) : texto;

            const secoes = {};
            marcadores.forEach((marcador, i) => {
                const proximoInicio = i + 1 < marcadores.length ? marcadores[i + 1].inicio : texto.length;
                // Corta no início da linha do próximo marcador (não bem na
                // frase-chave), pra não deixar sobrando símbolos de markdown
                // ("##", emoji) da seção seguinte grudados no fim desta. Nunca
                // corta antes do próprio corpo desta seção começar.
                const fim = i + 1 < marcadores.length
                    ? Math.max(marcador.fimCabecalho, inicioDaLinha(texto, proximoInicio, marcador.fimCabecalho))
                    : proximoInicio;
                secoes[marcador.tipo] = texto.slice(marcador.fimCabecalho, fim).trim();
            });

            // ---- Notícias ----
            const regexNoticia = /###\s*\[(.+?)\]\((.+?)\)\s*\n?([\s\S]*?)(?=(\n###\s*\[)|$)/g;
            let match;
            let indice = 0;
            let cardsHtml = '';

            while ((match = regexNoticia.exec(blocoNoticias)) !== null) {
                const titulo = match[1].trim();
                const url = match[2].trim();
                const resumo = match[3].replace(/^[\s\-•]+/, '').trim();

                if (!titulo || !url) continue;
                if (foraDeEscopo(titulo, resumo)) continue;

                indice += 1;
                const fonte = extrairFonte(url);

                cardsHtml += `
                    <article class="dossier-item">
                        <div class="dossier-marker"><span>${String(indice).padStart(2, '0')}</span></div>
                        <div class="dossier-body">
                            <div class="dossier-eyebrow">
                                <span class="fonte-tag">${fonte}</span>
                            </div>
                            <h3>${titulo}</h3>
                            <p>${resumo || 'Acesse o link para ler a cobertura completa.'}</p>
                            <a href="${url}" target="_blank" rel="noopener" class="cta-artigo">
                                Ler matéria completa <span class="seta">↗</span>
                            </a>
                        </div>
                    </article>
                `;
            }

            if (!cardsHtml) {
                cardsHtml = '<div class="status-msg">Nenhuma notícia estruturada encontrada neste briefing.</div>';
            }

            // ---- Perspectivas NIST / OWASP (cards simples, lado a lado) ----
            function montarCardPerspectiva(tipo, icone, titulo) {
                if (!secoes[tipo]) return '';
                const paragrafos = quebrarEmParagrafos(secoes[tipo]);
                if (!paragrafos.length) return '';
                return `
                    <div class="card-insight card-${tipo}">
                        <h2>${icone} ${titulo}</h2>
                        <ul class="lista-insights">
                            ${paragrafos.map((p) => `<li>${p}</li>`).join('')}
                        </ul>
                    </div>
                `;
            }

            const nistHtml = montarCardPerspectiva('nist', '🛡️', 'Perspectiva NIST');
            const owaspHtml = montarCardPerspectiva('owasp', '🔓', 'Perspectiva OWASP');
            const mitreHtml = montarCardPerspectiva('mitre', '🎯', 'Perspectiva MITRE ATLAS');
            const gridPerspectivasHtml = (nistHtml || owaspHtml || mitreHtml)
                ? `<div class="insights-grid">${nistHtml}${owaspHtml}${mitreHtml}</div>`
                : '';

            // ---- Insights Estratégicos (Gartner) — mantido como já era ----
            let gartnerHtml = '';
            if (secoes.gartner) {
                const paragrafos = quebrarEmParagrafos(secoes.gartner);
                if (paragrafos.length) {
                    gartnerHtml = `
                        <div class="card-gartner">
                            <h2>🧠 Insights Estratégicos</h2>
                            <ul class="lista-insights">
                                ${paragrafos.map((p) => `<li>${p}</li>`).join('')}
                            </ul>
                            <a href="https://www.gartner.com/en/information-technology/insights/top-technology-trends" target="_blank" rel="noopener" class="btn-gartner">
                                Acessar Portal Gartner <span class="seta">↗</span>
                            </a>
                        </div>
                    `;
                }
            }

            return `<div class="trilha">${cardsHtml}</div>${gridPerspectivasHtml}${gartnerHtml}`;
        }

        // Guarda os registros carregados (1 por dia, mais recentes primeiro)
        // para alimentar o seletor de histórico sem precisar de nova consulta
        // ao Supabase a cada clique.
        let historicoRegistros = [];

        function formatarDataCurta(dataString) {
            if (!dataString) return '';
            const soData = dataString.slice(0, 10);
            const [ano, mes, dia] = soData.split('-').map(Number);
            if (!ano || !mes || !dia) return '';
            const data = new Date(Date.UTC(ano, mes - 1, dia));
            return data.toLocaleDateString('pt-BR', {
                day: '2-digit', month: 'short', timeZone: 'UTC',
            });
        }

        function renderizarSeletorHistorico(idAtivo) {
            const nav = document.getElementById('seletor-historico');
            if (!nav) return;

            if (!historicoRegistros.length) {
                nav.innerHTML = '';
                return;
            }

            nav.innerHTML = historicoRegistros
                .map((registro, i) => {
                    const rotulo = i === 0 ? 'Hoje' : formatarDataCurta(registro.data_criacao);
                    const ativo = registro.id === idAtivo ? 'ativo' : '';
                    return `<button type="button" class="pill-historico ${ativo}" data-id="${registro.id}">${rotulo}</button>`;
                })
                .join('');

            nav.querySelectorAll('.pill-historico').forEach((botao) => {
                botao.addEventListener('click', () => exibirRegistro(Number(botao.dataset.id)));
            });
        }

        function exibirRegistro(id) {
            const registro = historicoRegistros.find((r) => r.id === id);
            if (!registro) return;

            const dataFormatada = formatarDataEmLinha(registro.data_criacao);
            document.getElementById('data-atual').innerText = dataFormatada || 'briefing';
            document.getElementById('app-content').innerHTML =
                processarTextoEConstruirLayout(registro.conteudo_markdown);

            renderizarSeletorHistorico(id);
        }

        async function obterDadosDoBanco() {
            if (SUPABASE_URL.startsWith("PROCESSED")) {
                document.getElementById('app-content').innerHTML =
                    `<div class="status-msg" style="color:#fbbf24;">Aguardando o fluxo de segurança do GitHub Actions publicar a página...</div>`;
                return;
            }

            try {
                const clientSupabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
                // Busca um lote maior de linhas (não só a mais recente) para
                // montar o seletor de histórico. Pode haver mais de uma linha
                // no mesmo dia (ex: execuções de teste) — por isso deduplicamos
                // por data, mantendo a de maior id (mais recente) de cada dia.
                const { data, error } = await clientSupabase
                    .from('relatorios_cti')
                    .select('*')
                    .order('id', { ascending: false })
                    .limit(30);

                if (error) throw error;

                if (!data || data.length === 0) {
                    document.getElementById('app-content').innerHTML =
                        '<div class="status-msg">Nenhum briefing disponível no momento.</div>';
                    return;
                }

                const porData = new Map();
                for (const registro of data) {
                    if (!porData.has(registro.data_criacao)) {
                        porData.set(registro.data_criacao, registro);
                    }
                }

                // Pelo menos 5 dias de histórico disponíveis para consulta,
                // com uma margem de 2 dias extra caso algum fique sem conteúdo.
                historicoRegistros = Array.from(porData.values()).slice(0, 7);

                exibirRegistro(historicoRegistros[0].id);
            } catch (err) {
                document.getElementById('app-content').innerHTML =
                    `<div class="status-msg" style="color:#ef4444;">Falha de comunicação: ${err.message}</div>`;
            }
        }

        window.addEventListener('load', obterDadosDoBanco);
    </script>
</body>
</html>
