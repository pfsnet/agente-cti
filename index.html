<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CTI Executivo - IA</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/dist/umd/supabase.js" crossorigin="anonymous"></script>
    
    <style>
        /* Variáveis de Cores Premium (Modo Escuro Executivo) */
        :root {
            --bg-fundo: #0f172a;
            --bg-card: #1e293b;
            --texto-titulo: #f8fafc;
            --texto-corpo: #cbd5e1;
            --azul-destaque: #38bdf8;
            --azul-fundo: rgba(56, 189, 248, 0.1);
            --roxo-destaque: #a78bfa;
            --borda-suave: #334155;
        }

        /* Reset Global e Responsividade Base */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-fundo);
            color: var(--texto-corpo);
            /* Impede o estouro lateral da tela */
            overflow-x: hidden; 
            display: flex;
            justify-content: center;
            line-height: 1.6;
        }

        .container {
            width: 100%;
            max-width: 600px;
            padding: 30px 16px; /* Espaçamento flexível para mobile */
        }

        /* Cabeçalho */
        header {
            text-align: center;
            margin-bottom: 30px;
        }

        header h1 {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--texto-titulo);
            margin-bottom: 4px;
            letter-spacing: -0.5px;
        }

        header p {
            font-size: 0.9rem;
            color: #94a3b8;
        }

        /* Estrutura dos Cards */
        .card {
            background-color: var(--bg-card);
            border: 1px solid var(--borda-suave);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 16px;
            /* Garante que o texto quebre e não estoure o card */
            overflow-wrap: break-word;
            word-wrap: break-word;
            word-break: break-word;
        }

        /* Tag de Link no Topo do Card */
        .tag-link {
            display: inline-flex;
            align-items: center;
            background-color: var(--azul-fundo);
            color: var(--azul-destaque);
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            text-decoration: none;
            margin-bottom: 12px;
            letter-spacing: 0.5px;
        }

        .card h3 {
            font-size: 1.15rem;
            color: var(--texto-titulo);
            margin-bottom: 8px;
            line-height: 1.4;
        }

        .card p {
            font-size: 0.95rem;
        }

        /* Área de Insights (Gartner) */
        .card-gartner {
            background: linear-gradient(145deg, #1e1b4b 0%, #1e293b 100%);
            border: 1px solid #4c1d95;
            border-radius: 12px;
            padding: 24px 20px;
            margin-top: 32px;
        }

        .card-gartner h2 {
            font-size: 1.2rem;
            color: var(--roxo-destaque);
            margin-bottom: 16px;
        }

        .card-gartner p {
            margin-bottom: 12px;
            font-size: 0.95rem;
        }

        .btn-gartner {
            display: block;
            background-color: #6d28d9;
            color: #ffffff;
            text-align: center;
            padding: 12px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 500;
            margin-top: 20px;
            font-size: 0.9rem;
        }

        /* Status e Erros */
        .status-msg {
            text-align: center;
            padding: 40px 20px;
            font-size: 0.95rem;
            color: #94a3b8;
        }

        /* Ajustes Finos para Telas Muito Pequenas */
        @media (max-width: 400px) {
            .container { padding: 20px 12px; }
            .card { padding: 16px; }
            header h1 { font-size: 1.6rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>CTI Executivo</h1>
            <p id="data-atual">Carregando painel de inteligência...</p>
        </header>

        <main id="app-content">
            <div class="status-msg">Estabelecendo conexão segura com o banco de dados...</div>
        </main>
    </div>

    <script>
        window.onerror = function(msg, url, line) {
            document.getElementById('app-content').innerHTML = `<div class="status-msg" style="color: #ef4444;">Erro na interface: ${msg}</div>`;
            return false;
        };

        const SUPABASE_URL = "PROCESSED_SUPABASE_URL"; 
        const SUPABASE_KEY = "PROCESSED_SUPABASE_KEY"; 

        function formatarDataEmLinha(dataString) {
            const opcoes = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            return new Date(dataString + 'T00:00:00').toLocaleDateString('pt-BR', opcoes);
        }

        function processarTextoEConstruirLayout(textoMarkdown) {
            const blocos = textoMarkdown.split('\n\n');
            let htmlFinal = '';
            let dentroDoGartner = false;
            let corpoGartner = '';

            blocos.forEach(bloco => {
                let linha = bloco.trim();
                if (!linha) return;

                // Limpeza Segura: Remove apenas asteriscos de formatação, preservando os hífens gramaticais
                linha = linha.replace(/\*/g, '');

                if (linha.includes('##') && (linha.toLowerCase().includes('gartner') || linha.includes('🧠'))) {
                    dentroDoGartner = true;
                    return;
                }

                if (dentroDoGartner) {
                    // Limpa traços ou bullets apenas no começo da frase
                    let textoLimpo = linha.replace(/^[\#\-]\s*/g, '');
                    corpoGartner += `<p>${textoLimpo}</p>`;
                    return;
                }

                if (linha.startsWith('###') || linha.includes('](')) {
                    const regexLink = /\[(.*?)\]\((.*?)\)/;
                    const encontrado = linha.match(regexLink);

                    let titulo = linha.replace(/^###\s*/, '').trim();
                    let url = '#';
                    let temLink = false;

                    if (encontrado) {
                        titulo = encontrado[1];
                        url = encontrado[2];
                        temLink = true;
                    }

                    const partes = linha.split('\n');
                    let textoResumo = partes.slice(1).join(' ').trim();
                    // Garante que bullets sumam do resumo, mas não os hífens das palavras
                    textoResumo = textoResumo.replace(/^[\-\•]\s*/g, '');
                    
                    const tituloLimpo = titulo.split('\n')[0].replace(/[\[\]]/g, '').trim();

                    htmlFinal += `
                        <div class="card">
                            <a href="${url}" target="${temLink ? '_blank' : '_self'}" class="tag-link">
                                🔗 ${temLink ? 'Ler Artigo Original' : 'Notícia'}
                            </a>
                            <h3>${tituloLimpo}</h3>
                            <p>${textoResumo || 'Acesse o link de referência acima para ler a cobertura completa.'}</p>
                        </div>
                    `;
                } else {
                    if (htmlFinal !== '') {
                        let textoLimpo = linha.replace(/^[\#\-]\s*/g, '');
                        htmlFinal += `<div class="card"><p>${textoLimpo}</p></div>`;
                    }
                }
            });

            if (dentroDoGartner) {
                htmlFinal += `
                    <div class="card-gartner">
                        <h2>🧠 Insights Estratégicos</h2>
                        ${corpoGartner}
                        <a href="https://www.gartner.com/en/information-technology/insights/top-technology-trends" target="_blank" class="btn-gartner">
                            Acessar Portal Gartner ↗
                        </a>
                    </div>
                `;
            }

            return htmlFinal;
        }

        async function obterDadosDoBanco() {
            if (SUPABASE_URL.startsWith("PROCESSED")) {
                document.getElementById('app-content').innerHTML = `<div class="status-msg" style="color: #fbbf24;">Aguardando o fluxo de segurança do GitHub Actions publicar a página...</div>`;
                return;
            }

            try {
                const clientSupabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
                const { data, error } = await clientSupabase
                    .from('relatorios_cti')
                    .select('*')
                    .order('data_criacao', { ascending: false })
                    .limit(1);

                if (error) throw error;

                if (data && data.length > 0) {
                    const registro = data[0];
                    document.getElementById('data-atual').innerText = formatarDataEmLinha(registro.data_criacao);
                    document.getElementById('app-content').innerHTML = processarTextoEConstruirLayout(registro.conteudo_markdown);
                } else {
                    document.getElementById('app-content').innerHTML = '<div class="status-msg">Nenhum briefing disponível no momento.</div>';
                }
            } catch (err) {
                document.getElementById('app-content').innerHTML = `<div class="status-msg" style="color: #ef4444;">Falha de comunicação: ${err.message}</div>`;
            }
        }

        window.addEventListener('load', obterDadosDoBanco);
    </script>
</body>
</html>
