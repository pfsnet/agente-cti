<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CTI Briefing</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background-color: #121212; 
            color: #e0e0e0; 
            margin: 0; 
            padding: 20px; 
            line-height: 1.6;
        }
        h1, h2, h3 { color: #ffffff; margin-top: 30px; }
        a { color: #4DA8DA; text-decoration: none; font-weight: bold; }
        .header { text-align: center; margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .date { color: #888; font-size: 0.9em; margin-bottom: 20px; text-align: center; }
        .card { 
            background-color: #1e1e1e; 
            padding: 25px; 
            border-radius: 12px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.5); 
        }
        ul { padding-left: 20px; }
    </style>
</head>
<body>
    <div class="header">
        <h2>⚡ Inteligência Executiva CTI</h2>
    </div>
    
    <div id="content" class="card">
        <p style="text-align: center;">Carregando briefing de hoje...</p>
    </div>

    <script>
        // --- COLOQUE SUAS CHAVES DO SUPABASE AQUI ---
        const SUPABASE_URL = 'https://oyqwufkmwgddahgskrro.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im95cXd1Zmttd2dkZGFoZ3NrcnJvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMyNjI1NTUsImV4cCI6MjA5ODgzODU1NX0.IFw5RlloQr48hHOysgoV1xNdW71MT86B4V9e8fDP_4g';

        async function carregarRelatorio() {
            try {
                // Busca o relatório mais recente
                const response = await fetch(`${SUPABASE_URL}/rest/v1/relatorios_cti?select=*&order=data_criacao.desc&limit=1`, {
                    headers: {
                        'apikey': SUPABASE_ANON_KEY,
                        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
                    }
                });
                
                const data = await response.json();
                
                if(data && data.length > 0) {
                    const relatorio = data[0];
                    // Transforma o Markdown em visual nativo
                    const htmlConteudo = marked.parse(relatorio.conteudo_markdown);
                    
                    document.getElementById('content').innerHTML = `
                        <div class="date">Briefing gerado em: ${relatorio.data_criacao}</div>
                        <div>${htmlConteudo}</div>
                    `;
                } else {
                    document.getElementById('content').innerHTML = "<p>Nenhum relatório encontrado no banco de dados.</p>";
                }
            } catch (error) {
                document.getElementById('content').innerHTML = "<p>Erro ao conectar com o servidor.</p>";
            }
        }

        carregarRelatorio();
    </script>
</body>
</html>
