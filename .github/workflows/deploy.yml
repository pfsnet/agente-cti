name: Deploy Seguro para GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch: # Permite que você clique para rodar manualmente se quiser

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do Código
        uses: actions/checkout@v4

      - name: Injetar Chaves Secretas de Forma Segura
        run: |
          sed -i 's|PROCESSED_SUPABASE_URL|${{ secrets.SUPABASE_URL }}|g' index.html
          sed -i 's|PROCESSED_SUPABASE_KEY|${{ secrets.SUPABASE_KEY }}|g' index.html

      - name: Configurar Pages
        uses: actions/configure-pages@v5

      - name: Upload do Artefato
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Publicar no GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
