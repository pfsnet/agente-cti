<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mundo Acadêmico - IA</title>
    <!-- Evita que navegadores (principalmente desktop) fiquem presos em uma
         versão em cache do HTML/JS após um novo deploy — sem isso, quem já
         visitou o site pode continuar vendo a lógica antiga (ex: recursos
         que só existiam em versões anteriores) até fazer refresh forçado. -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,600;0,700;1,600&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/dist/umd/supabase.js" crossorigin="anonymous"></script>

    <style>
        /* ==================== Tokens ==================== */
        :root {
            --ink: #0a0c10;
            --surface: #14181f;
            --surface-raised: #1b212b;
            --hairline: #262d38;
            --texto-titulo: #ecf0f2;
            --texto-corpo: #b6bcc4;
            --texto-tenue: #6b7280;

            --sinal: #6366f1;
            --sinal-fundo: rgba(99, 102, 241, 0.12);
            --violeta: #8b7cf6;
            --violeta-fundo: rgba(139, 124, 246, 0.12);
            --vivo: #34d399;

            --nist-cor: #2dd4bf;
            --nist-fundo: rgba(45, 212, 191, 0.12);
            --owasp-cor: #fb7185;
            --owasp-fundo: rgba(251, 113, 133, 0.12);
            --mitre-cor: #60a5fa;
            --mitre-fundo: rgba(96, 165, 250, 0.12);

            --fonte-display: 'Fraunces', Georgia, serif;
            --fonte-corpo: 'Inter', sans-serif;
            --fonte-mono: 'IBM Plex Mono', ui-monospace, monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--ink);
            background-image:
                radial-gradient(ellipse 900px 500px at 50% -10%, rgba(99, 102, 241, 0.08), transparent);
            color: var(--texto-corpo);
            font-family: var(--fonte-corpo);
            overflow-x: hidden;
            display: flex;
            justify-content: center;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        a { color: inherit; }
        a:focus-visible, button:focus-visible {
            outline: 2px solid var(--sinal);
            outline-offset: 3px;
            border-radius: 4px;
        }

        .container {
            width: 100%;
            max-width: 920px;
            padding: 28px 18px 56px;
        }

        /* ==================== Cabeçalho / Ticker ==================== */
        .ticker {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-family: var(--fonte-mono);
            font-size: 0.7rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--texto-tenue);
            margin: 0 auto 18px;
            max-width: 600px;
        }

        .ticker-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--vivo);
            box-shadow: 0 0 0 0 rgba(52, 211, 153, 0.6);
            animation: pulso 2.4s ease-out infinite;
            flex-shrink: 0;
        }

        @keyframes pulso {
            0%   { box-shadow: 0 0 0 0 rgba(52, 211, 153, 0.55); }
            70%  { box-shadow: 0 0 0 7px rgba(52, 211, 153, 0); }
            100% { box-shadow: 0 0 0 0 rgba(52, 211, 153, 0); }
        }

        @media (prefers-reduced-motion: reduce) {
            .ticker-dot { animation: none; }
        }

        header {
            text-align: center;
            margin: 0 auto 34px;
            max-width: 600px;
        }

        header h1 {
            font-family: var(--fonte-display);
            font-weight: 700;
            font-size: 2.1rem;
            color: var(--texto-titulo);
            letter-spacing: -0.01em;
        }

        header h1 em {
            font-style: italic;
            font-weight: 600;
            color: var(--sinal);
        }

        header .subtitulo {
            font-size: 0.9rem;
            color: var(--texto-tenue);
            margin-top: 6px;
        }

        /* ==================== Botão Mundo Acadêmico ==================== */
        .botao-academico {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            background: #4338ca;
            color: #ffffff;
            text-decoration: none;
            border-radius: 10px;
            padding: 13px;
            font-family: var(--fonte-mono);
            font-size: 0.82rem;
            font-weight: 500;
            letter-spacing: 0.02em;
            margin-bottom: 24px;
            transition: filter 0.2s ease;
        }

        .botao-academico:hover {
            filter: brightness(1.12);
        }

        .botao-academico .seta {
            transition: transform 0.2s ease;
        }

        .botao-academico:hover .seta {
            transform: translate(2px, -2px);
        }

        /* ==================== Seletor de histórico ==================== */
        .seletor-historico {
            display: flex;
            justify-content: center;
            gap: 8px;
            overflow-x: auto;
            padding: 2px 2px 6px;
            margin: 0 auto 28px;
            max-width: 600px;
            scrollbar-width: none;
        }

        .seletor-historico::-webkit-scrollbar { display: none; }

        .pill-historico {
            flex-shrink: 0;
            font-family: var(--fonte-mono);
            font-size: 0.72rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--texto-tenue);
            background: var(--surface);
            border: 1px solid var(--hairline);
            border-radius: 20px;
            padding: 7px 14px;
            cursor: pointer;
            transition: border-color 0.2s ease, color 0.2s ease, background 0.2s ease;
        }

        .pill-historico:hover {
            border-color: rgba(99, 102, 241, 0.4);
            color: var(--texto-titulo);
        }

        .pill-historico.ativo {
            background: var(--sinal-fundo);
            border-color: var(--sinal);
            color: var(--sinal);
        }

        /* ==================== Trilha de notícias (dossiê) ==================== */
        .trilha {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 16px;
            align-items: stretch;
            margin-bottom: 20px;
        }

        .dossier-item {
            display: grid;
            grid-template-columns: 34px 1fr;
            gap: 14px;
        }

        .dossier-marker {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: var(--surface);
            border: 1px solid var(--hairline);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--fonte-mono);
            font-size: 0.72rem;
            font-weight: 500;
            color: var(--sinal);
            flex-shrink: 0;
            z-index: 1;
            align-self: start;
        }

        .dossier-body {
            background-color: var(--surface);
            border: 1px solid var(--hairline);
            border-radius: 14px;
            padding: 18px 18px 16px;
            overflow-wrap: break-word;
            word-break: break-word;
            transition: border-color 0.2s ease, transform 0.2s ease;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .dossier-body:hover {
            border-color: rgba(99, 102, 241, 0.35);
            transform: translateY(-1px);
        }

        .dossier-eyebrow {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 10px;
        }

        .fonte-tag {
            font-family: var(--fonte-mono);
            font-size: 0.68rem;
            font-weight: 500;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--sinal);
            background: var(--sinal-fundo);
            padding: 4px 8px;
            border-radius: 6px;
        }

        .dossier-body h3 {
            font-family: var(--fonte-display);
            font-weight: 600;
            font-size: 1.12rem;
            line-height: 1.35;
            color: var(--texto-titulo);
            margin-bottom: 8px;
        }

        .dossier-body p {
            font-size: 0.92rem;
            color: var(--texto-corpo);
            margin-bottom: 14px;
            flex: 1 1 auto;
        }

        .cta-artigo {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-family: var(--fonte-mono);
            font-size: 0.76rem;
            font-weight: 500;
            letter-spacing: 0.02em;
            color: var(--sinal);
            text-decoration: none;
            border: 1px solid rgba(99, 102, 241, 0.35);
            padding: 8px 12px;
            border-radius: 8px;
            align-self: flex-start;
            transition: background 0.2s ease, border-color 0.2s ease;
        }

        .cta-artigo:hover {
            background: var(--sinal-fundo);
            border-color: var(--sinal);
        }

        .cta-artigo .seta {
            transition: transform 0.2s ease;
        }

        .cta-artigo:hover .seta {
            transform: translate(2px, -2px);
        }

        /* ==================== Perspectivas (NIST / OWASP) ==================== */
        .insights-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 16px;
            margin-bottom: 16px;
        }

        .card-insight {
            background: var(--surface);
            border: 1px solid var(--hairline);
            border-radius: 16px;
            padding: 22px 20px;
        }

        .card-insight h2 {
            font-family: var(--fonte-display);
            font-weight: 600;
            font-size: 1.05rem;
            margin-bottom: 14px;
        }

        .card-insight .lista-insights li::before {
            background: currentColor;
        }

        .card-insight.card-nist {
            border-color: rgba(45, 212, 191, 0.3);
            background: radial-gradient(ellipse 380px 180px at 20% 0%, var(--nist-fundo), transparent), var(--surface);
        }

        .card-insight.card-nist h2 { color: var(--nist-cor); }
        .card-insight.card-nist .lista-insights li::before { background: var(--nist-cor); }

        .card-insight.card-owasp {
            border-color: rgba(251, 113, 133, 0.3);
            background: radial-gradient(ellipse 380px 180px at 20% 0%, var(--owasp-fundo), transparent), var(--surface);
        }

        .card-insight.card-owasp h2 { color: var(--owasp-cor); }
        .card-insight.card-owasp .lista-insights li::before { background: var(--owasp-cor); }

        .card-insight.card-mitre {
            border-color: rgba(96, 165, 250, 0.3);
            background: radial-gradient(ellipse 380px 180px at 20% 0%, var(--mitre-fundo), transparent), var(--surface);
        }

        .card-insight.card-mitre h2 { color: var(--mitre-cor); }
        .card-insight.card-mitre .lista-insights li::before { background: var(--mitre-cor); }

        /* ==================== Insights (Gartner) ==================== */
        .card-gartner {
            background:
                radial-gradient(ellipse 400px 200px at 20% 0%, rgba(139, 124, 246, 0.14), transparent),
                var(--surface);
            border: 1px solid rgba(139, 124, 246, 0.3);
            border-radius: 16px;
            padding: 26px 20px 22px;
            margin-top: 12px;
        }

        .card-gartner h2 {
            font-family: var(--fonte-display);
            font-weight: 600;
            font-size: 1.15rem;
            color: var(--violeta);
            margin-bottom: 16px;
        }

        .card-gartner p {
            margin-bottom: 13px;
            font-size: 0.92rem;
            color: var(--texto-corpo);
        }

        .card-gartner p:last-of-type { margin-bottom: 0; }

        .lista-insights {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .lista-insights li {
            position: relative;
            padding-left: 20px;
            margin-bottom: 14px;
            font-size: 0.92rem;
            color: var(--texto-corpo);
            line-height: 1.55;
        }

        .lista-insights li::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0.58em;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--violeta);
        }

        .lista-insights li:last-child { margin-bottom: 0; }

        .card-gartner strong {
            color: var(--texto-titulo);
            font-weight: 600;
        }

        .btn-gartner {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background-color: var(--violeta);
            color: #ffffff;
            text-align: center;
            padding: 13px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 500;
            font-size: 0.9rem;
            margin-top: 20px;
            transition: filter 0.2s ease;
        }

        .btn-gartner:hover { filter: brightness(1.1); }

        /* ==================== Status / Erros ==================== */
        .status-msg {
            text-align: center;
            padding: 40px 20px;
            font-size: 0.9rem;
            color: var(--texto-tenue);
            font-family: var(--fonte-mono);
        }

        @media (max-width: 400px) {
            .container { padding: 22px 12px 48px; }
            .dossier-body { padding: 16px; }
            header h1 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="ticker">
            <span class="ticker-dot"></span>
            <span>AO VIVO</span>
            <span id="data-atual">carregando briefing</span>
        </div>

        <header>
            <h1>Mundo <em>acadêmico</em></h1>
            <p class="subtitulo">Pesquisa e tendências direto dos centros de estudo em IA</p>
        </header>

        <a href="index.html" class="botao-academico">
            <span class="seta">←</span> IA News
        </a>

        <nav id="seletor-historico" class="seletor-historico" aria-label="Histórico de digests"></nav>

        <main id="app-content">
            <div class="status-msg">Estabelecendo conexão segura com o banco de dados...</div>
        </main>
    </div>

    <script>
        window.onerror = function (msg) {
            document.getElementById('app-content').innerHTML =
                `<div class="status-msg" style="color:#ef4444;">Erro na interface: ${msg}</div>`;
            return false;
        };

        // window.onerror sozinho NÃO captura falhas dentro de funções async
        // (viram "unhandled promise rejection", categoria separada) — sem
        // este listener, uma exceção síncrona lançada dentro de uma função
        // async (ex: createClient() com chave inválida) trava a página no
        // texto de carregamento estático, sem nenhuma mensagem de erro.
        window.addEventListener('unhandledrejection', function (event) {
            document.getElementById('app-content').innerHTML =
                `<div class="status-msg" style="color:#ef4444;">Erro na interface: ${event.reason?.message || event.reason}</div>`;
        });

        const SUPABASE_URL = "PROCESSED_SUPABASE_URL";
        const SUPABASE_ANON_KEY = "PROCESSED_SUPABASE_KEY";

        // Mapa de nomes de exibição para fontes conhecidas — usado para gerar
        // a etiqueta de cada card a partir do domínio do link, já que o
        // relatório final (markdown) não carrega mais o nome da fonte.
        const NOMES_FONTES = {
            'arxiv.org': 'arXiv (cs.AI)',
            'bair.berkeley.edu': 'Berkeley (BAIR)',
            'news.mit.edu': 'MIT (Machine Learning)',
            'blog.ml.cmu.edu': 'CMU (Machine Learning Dept)',
            'news.cs.washington.edu': 'University of Washington',
            'ethz.ch': 'ETH Zurich',
            'www.ethz.ch': 'ETH Zurich',
            'news.nus.edu.sg': 'NUS Singapura',
        };

        function extrairFonte(url) {
            try {
                const host = new URL(url).hostname.replace(/^www\./, '');
                if (NOMES_FONTES[host]) return NOMES_FONTES[host];
                const partes = host.split('.');
                const base = partes.length >= 2 ? partes[partes.length - 2] : host;
                return base.charAt(0).toUpperCase() + base.slice(1);
            } catch {
                return 'Fonte';
            }
        }

        // Filtro de segurança client-side: mesmo com a regra no prompt, itens
        // fora do escopo (jogos, entretenimento) às vezes escapam do feed/LLM.
        // Isso é um reforço visual — a correção definitiva é no filtro do
        // script Python que monta os dados brutos.
        const PALAVRAS_FORA_DE_ESCOPO = [
            'wordle', 'horóscopo', 'crossword', 'palavra do dia', 'sudoku',
            'strands', 'spangram', 'nyt connections',
        ];

        function foraDeEscopo(titulo, resumo) {
            const texto = `${titulo} ${resumo}`.toLowerCase();
            return PALAVRAS_FORA_DE_ESCOPO.some(p => texto.includes(p));
        }

        function formatarDataEmLinha(dataString) {
            if (!dataString) return '';
            // Usa só a parte AAAA-MM-DD e formata forçando UTC — isso evita que o
            // navegador reinterprete "meia-noite UTC" como "21h do dia anterior"
            // no fuso de Brasília (UTC-3), o que fazia o cabeçalho e o histórico
            // aparecerem sempre um dia atrasados.
            const soData = dataString.slice(0, 10);
            const [ano, mes, dia] = soData.split('-').map(Number);
            if (!ano || !mes || !dia) return '';
            const data = new Date(Date.UTC(ano, mes - 1, dia));
            const opcoes = {
                weekday: 'long', year: 'numeric', month: 'long', day: 'numeric',
                timeZone: 'UTC',
            };
            return data.toLocaleDateString('pt-BR', opcoes);
        }

        // Quebra um bloco de texto corrido em parágrafos — tenta linha em
        // branco primeiro; se vier tudo em um bloco só, quebra antes de cada
        // "Sub-título:" (heurística usada quando a formatação em negrito do
        // markdown original se perde). Reaproveitada pelas 3 seções de
        // insight (NIST, OWASP, Gartner).
        function quebrarEmParagrafos(bruto) {
            let paragrafos = bruto.split(/\n{2,}/).map((p) => p.trim()).filter(Boolean);

            if (paragrafos.length <= 1) {
                const regexTitulo = /(^|\.\s+)([A-ZÀ-Ú][^.:]{3,70}?):\s+/g;
                const pontos = [];
                let m;
                while ((m = regexTitulo.exec(bruto)) !== null) {
                    pontos.push(m.index + m[1].length);
                }
                if (pontos.length > 1) {
                    paragrafos = pontos
                        .map((inicio, i) => {
                            const fim = i + 1 < pontos.length ? pontos[i + 1] : bruto.length;
                            return bruto.slice(inicio, fim).trim();
                        })
                        .filter(Boolean);
                } else {
                    paragrafos = [bruto];
                }
            }

            return paragrafos
                .map((p) => p.replace(/^([A-ZÀ-Ú][^:]{3,70}):\s*/, '<strong>$1:</strong> '))
                .filter(Boolean);
        }

        // Faz o parsing de UM relatório (uma linha do banco) em dados
        // estruturados — sem montar HTML ainda. Isso permite reaproveitar a
        // mesma lógica tanto para exibir um único relatório quanto para
        // mesclar várias execuções do mesmo dia (ver montarConteudoDoGrupo).
        function parseUmRelatorio(textoMarkdown) {
            if (!textoMarkdown || !textoMarkdown.trim()) {
                return { itens: [], secoes: {} };
            }

            const texto = textoMarkdown.replace(/\*\*?/g, '');

            const candidatosSecao = [
                { tipo: 'nist', regex: /perspectiva\s+nist/i },
                { tipo: 'owasp', regex: /perspectiva\s+owasp/i },
                { tipo: 'mitre', regex: /perspectiva\s+mitre(\s+atlas)?/i },
                { tipo: 'gartner', regex: /insights\s+estrat[ée]gicos|perspectiva\s+gartner/i },
            ];

            const marcadores = [];
            candidatosSecao.forEach(({ tipo, regex }) => {
                const achado = texto.match(regex);
                if (achado) {
                    let fimCabecalho = achado.index + achado[0].length;
                    const restante = texto.slice(fimCabecalho);
                    const extra = restante.match(/^(\s*\([^)]{0,80}\))?\s*:?\s*/);
                    if (extra) fimCabecalho += extra[0].length;
                    marcadores.push({ tipo, inicio: achado.index, fimCabecalho });
                }
            });
            marcadores.sort((a, b) => a.inicio - b.inicio);

            function inicioDaLinha(txt, pos, minPos) {
                const idx = txt.lastIndexOf('\n', pos - 1);
                if (idx === -1 || idx + 1 < minPos) return pos;
                return idx + 1;
            }

            const blocoNoticias = marcadores.length ? texto.slice(0, marcadores[0].inicio) : texto;

            const secoes = {};
            marcadores.forEach((marcador, i) => {
                const proximoInicio = i + 1 < marcadores.length ? marcadores[i + 1].inicio : texto.length;
                const fim = i + 1 < marcadores.length
                    ? Math.max(marcador.fimCabecalho, inicioDaLinha(texto, proximoInicio, marcador.fimCabecalho))
                    : proximoInicio;
                secoes[marcador.tipo] = texto.slice(marcador.fimCabecalho, fim).trim();
            });

            const regexNoticia = /###\s*\[(.+?)\]\((.+?)\)\s*\n?([\s\S]*?)(?=(\n###\s*\[)|$)/g;
            let match;
            const itens = [];
            while ((match = regexNoticia.exec(blocoNoticias)) !== null) {
                const titulo = match[1].trim();
                const url = match[2].trim();
                const resumo = match[3].replace(/^[\s\-•]+/, '').trim();

                if (!titulo || !url) continue;
                if (foraDeEscopo(titulo, resumo)) continue;

                itens.push({ titulo, url, resumo });
            }

            return { itens, secoes };
        }

        // Constrói o HTML final a partir de dados já estruturados (itens +
        // seções) — usado tanto para um único relatório quanto para o
        // resultado já mesclado de várias execuções do mesmo dia.
        function construirHtmlDoBriefing(itens, secoes) {
            let cardsHtml = '';

            itens.forEach((item, i) => {
                const fonte = extrairFonte(item.url);
                cardsHtml += `
                    <article class="dossier-item">
                        <div class="dossier-marker"><span>${String(i + 1).padStart(2, '0')}</span></div>
                        <div class="dossier-body">
                            <div class="dossier-eyebrow">
                                <span class="fonte-tag">${fonte}</span>
                            </div>
                            <h3>${item.titulo}</h3>
                            <p>${item.resumo || 'Acesse o link para ler a cobertura completa.'}</p>
                            <a href="${item.url}" target="_blank" rel="noopener" class="cta-artigo">
                                Ler matéria completa <span class="seta">↗</span>
                            </a>
                        </div>
                    </article>
                `;
            });

            if (!cardsHtml) {
                cardsHtml = '<div class="status-msg">Nenhuma notícia estruturada encontrada neste briefing.</div>';
            }

            function montarCardPerspectiva(tipo, icone, titulo) {
                if (!secoes[tipo]) return '';
                const paragrafos = quebrarEmParagrafos(secoes[tipo]);
                if (!paragrafos.length) return '';
                return `
                    <div class="card-insight card-${tipo}">
                        <h2>${icone} ${titulo}</h2>
                        <ul class="lista-insights">
                            ${paragrafos.map((p) => `<li>${p}</li>`).join('')}
                        </ul>
                    </div>
                `;
            }

            const nistHtml = montarCardPerspectiva('nist', '🛡️', 'Perspectiva NIST');
            const owaspHtml = montarCardPerspectiva('owasp', '🔓', 'Perspectiva OWASP');
            const mitreHtml = montarCardPerspectiva('mitre', '🎯', 'Perspectiva MITRE ATLAS');
            const gridPerspectivasHtml = (nistHtml || owaspHtml || mitreHtml)
                ? `<div class="insights-grid">${nistHtml}${owaspHtml}${mitreHtml}</div>`
                : '';

            let gartnerHtml = '';
            if (secoes.gartner) {
                const paragrafos = quebrarEmParagrafos(secoes.gartner);
                if (paragrafos.length) {
                    gartnerHtml = `
                        <div class="card-gartner">
                            <h2>🧠 Insights Estratégicos</h2>
                            <ul class="lista-insights">
                                ${paragrafos.map((p) => `<li>${p}</li>`).join('')}
                            </ul>
                            <a href="https://www.gartner.com/en/information-technology/insights/top-technology-trends" target="_blank" rel="noopener" class="btn-gartner">
                                Acessar Portal Gartner <span class="seta">↗</span>
                            </a>
                        </div>
                    `;
                }
            }

            return `<div class="trilha">${cardsHtml}</div>${gridPerspectivasHtml}${gartnerHtml}`;
        }

        // Mescla todas as execuções (linhas) de um mesmo dia em um único
        // briefing: soma as notícias de todas elas (sem duplicar por link —
        // fica com a versão mais recente de cada item) e usa as seções de
        // análise (NIST/OWASP/MITRE/Gartner) só da execução mais recente do
        // dia. Resolve o caso de rodar o script manualmente mais de uma vez
        // no mesmo dia: antes, a página só mostrava a última execução,
        // "escondendo" notícias já coletadas por uma execução anterior no
        // mesmo dia que não foram repetidas na seguinte (por causa da regra
        // de anti-repetição).
        function montarConteudoDoGrupo(linhas) {
            if (!linhas || !linhas.length) {
                return '<div class="status-msg">Nenhum conteúdo disponível neste briefing.</div>';
            }

            const vistos = new Set();
            const itensMerged = [];
            let secoesDaMaisRecente = {};

            linhas.forEach((linha, i) => {
                const { itens, secoes } = parseUmRelatorio(linha.conteudo_markdown);
                if (i === 0) secoesDaMaisRecente = secoes;
                itens.forEach((item) => {
                    if (!vistos.has(item.url)) {
                        vistos.add(item.url);
                        itensMerged.push(item);
                    }
                });
            });

            return construirHtmlDoBriefing(itensMerged, secoesDaMaisRecente);
        }

        // Guarda os GRUPOS de registros por dia (pode haver mais de uma
        // execução no mesmo dia) — cada grupo já vem ordenado por id
        // decrescente (mais recente primeiro) dentro do próprio dia.
        let historicoGrupos = [];

        function formatarDataCurta(dataString) {
            if (!dataString) return '';
            const soData = dataString.slice(0, 10);
            const [ano, mes, dia] = soData.split('-').map(Number);
            if (!ano || !mes || !dia) return '';
            const data = new Date(Date.UTC(ano, mes - 1, dia));
            return data.toLocaleDateString('pt-BR', {
                day: '2-digit', month: 'short', timeZone: 'UTC',
            });
        }

        function dataDeHojeBrasil() {
            // Mesma referência de "hoje" usada pelo backend (fuso de
            // Brasília), calculada no navegador via Intl para não depender
            // do fuso local de quem está acessando.
            const partes = new Intl.DateTimeFormat('en-CA', {
                timeZone: 'America/Sao_Paulo',
                year: 'numeric', month: '2-digit', day: '2-digit',
            }).format(new Date());
            return partes; // formato AAAA-MM-DD, mesmo formato do banco
        }

        function renderizarSeletorHistorico(dataAtiva) {
            const nav = document.getElementById('seletor-historico');
            if (!nav) return;

            if (!historicoGrupos.length) {
                nav.innerHTML = '';
                return;
            }

            const hoje = dataDeHojeBrasil();

            nav.innerHTML = historicoGrupos
                .map((grupo) => {
                    const rotulo = grupo.data === hoje ? 'Hoje' : formatarDataCurta(grupo.data);
                    const ativo = grupo.data === dataAtiva ? 'ativo' : '';
                    return `<button type="button" class="pill-historico ${ativo}" data-date="${grupo.data}">${rotulo}</button>`;
                })
                .join('');

            nav.querySelectorAll('.pill-historico').forEach((botao) => {
                botao.addEventListener('click', () => exibirGrupo(botao.dataset.date));
            });
        }

        function exibirGrupo(data) {
            const grupo = historicoGrupos.find((g) => g.data === data);
            if (!grupo) return;

            const dataFormatada = formatarDataEmLinha(grupo.data);
            document.getElementById('data-atual').innerText = dataFormatada || 'briefing';
            document.getElementById('app-content').innerHTML = montarConteudoDoGrupo(grupo.linhas);

            renderizarSeletorHistorico(data);
        }

        // Client Supabase reaproveitado entre a busca do briefing e o
        // registro de visita — evita criar uma instância nova para cada uso.
        let _clientSupabase = null;
        function obterClienteSupabase() {
            if (SUPABASE_URL.startsWith("PROCESSED") || SUPABASE_ANON_KEY.startsWith("PROCESSED")) {
                return null;
            }
            if (!SUPABASE_URL.trim() || !SUPABASE_ANON_KEY.trim()) {
                // Placeholder foi substituído, mas por uma string vazia —
                // sinal de que o secret referenciado no workflow de deploy
                // não existe ou está com nome diferente do esperado.
                document.getElementById('app-content').innerHTML =
                    `<div class="status-msg" style="color:#ef4444;">Configuração ausente: verifique se os secrets SUPABASE_URL e SUPABASE_ANON_KEY existem no repositório com esse nome exato.</div>`;
                return null;
            }
            if (!_clientSupabase) {
                try {
                    _clientSupabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                } catch (err) {
                    document.getElementById('app-content').innerHTML =
                        `<div class="status-msg" style="color:#ef4444;">Falha ao iniciar conexão: ${err.message}</div>`;
                    return null;
                }
            }
            return _clientSupabase;
        }

        async function obterDadosDoBanco() {
            const clientSupabase = obterClienteSupabase();
            if (!clientSupabase) {
                document.getElementById('app-content').innerHTML =
                    `<div class="status-msg" style="color:#fbbf24;">Aguardando o fluxo de segurança do GitHub Actions publicar a página...</div>`;
                return;
            }

            try {
                // Busca um lote maior de linhas (não só a mais recente) para
                // montar o seletor de histórico. Pode haver mais de uma linha
                // no mesmo dia (ex: execuções de teste) — por isso deduplicamos
                // por data, mantendo a de maior id (mais recente) de cada dia.
                const { data, error } = await clientSupabase
                    .from('relatorios_academico')
                    .select('*')
                    .order('id', { ascending: false })
                    .limit(60);

                if (error) throw error;

                if (!data || data.length === 0) {
                    document.getElementById('app-content').innerHTML =
                        '<div class="status-msg">Nenhum briefing disponível no momento.</div>';
                    return;
                }

                const porData = new Map();
                for (const registro of data) {
                    if (!porData.has(registro.data_criacao)) {
                        porData.set(registro.data_criacao, []);
                    }
                    porData.get(registro.data_criacao).push(registro);
                }

                // Pelo menos 5 dias de histórico disponíveis para consulta,
                // com uma margem de 2 dias extra caso algum fique sem conteúdo.
                historicoGrupos = Array.from(porData.entries())
                    .slice(0, 7)
                    .map(([dataChave, linhas]) => ({ data: dataChave, linhas }));

                exibirGrupo(historicoGrupos[0].data);
            } catch (err) {
                document.getElementById('app-content').innerHTML =
                    `<div class="status-msg" style="color:#ef4444;">Falha de comunicação: ${err.message}</div>`;
            }
        }

        window.addEventListener('load', obterDadosDoBanco);
    </script>
</body>
</html>
